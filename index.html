<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Hogwarts Computer Examination</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
--gold:#eeba30;
--gold2:#d4af37;
--bg:#07070f;
--glass:rgba(15,15,25,.65);
--border:rgba(255,255,255,.08);
--green:#10b981;
--red:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat',sans-serif;
background:url('hogward.jpg') center/cover fixed;
color:white;
min-height:100vh;
overflow-x:hidden;
}

#particle-canvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

main{
position:relative;
z-index:10;
padding:25px;
max-width:1400px;
margin:auto;
}

.glass{
background:rgba(0,0,0,.45);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.title{
font-family:'Cinzel Decorative';
font-size:3rem;
text-align:center;
margin-bottom:20px;
background:linear-gradient(#fff,var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hidden{display:none!important;}

.login-card{max-width:500px;margin:auto;padding:35px;}

input{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:20px;
border-radius:15px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:white;
}

label{font-size:.85rem;color:var(--gold);}

button{cursor:pointer;border:none;}

.wax-btn{
width:120px;height:120px;border-radius:50%;
margin:auto;display:block;
font-size:1.2rem;font-weight:bold;
background:radial-gradient(circle,#9f1d1d,#5c0000);
color:white;
}

.quiz-layout{display:grid;grid-template-columns:1fr 320px;gap:25px;}

@media(max-width:1000px){
.quiz-layout{grid-template-columns:1fr;}
}

.quiz-main{padding:30px;}

.question{
font-size:1.4rem;
font-family:'Cinzel';
margin-bottom:25px;
}

.option{
padding:16px;margin-bottom:12px;
border-radius:15px;
background:rgba(255,255,255,.05);
cursor:pointer;
transition:.25s;
}

.option:hover{transform:translateX(6px);}

.option.selected{
background:rgba(16,185,129,.25);
border:1px solid rgba(16,185,129,.6);
}

.nav-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.nav-grid button{
aspect-ratio:1;
border-radius:50%;
background:rgba(239,68,68,.2);
color:#ff8a8a;
}

.nav-grid button.done{
background:rgba(16,185,129,.2);
color:#7ef0c1;
}

.nav-grid button.current{border:3px solid gold;}

.timer{font-size:1.5rem;font-family:'Cinzel';color:gold;}

.action-row{display:flex;gap:10px;margin-top:25px;flex-wrap:wrap;}

.action{padding:12px 22px;border-radius:25px;font-weight:600;}

.next{background:gold;color:black;}
.submit{background:#10b981;color:white;}
.prev{background:#333;color:white;}

.result{text-align:center;padding:60px 30px;}
.result h2{font-family:'Cinzel';color:var(--gold);margin-top:10px;font-weight:400;}

body,*{cursor:url("wand-glow.png"),auto;}
</style>
</head>

<body>

<canvas id="particle-canvas"></canvas>

<main>

<section id="loginPage" class="glass login-card">
<h1 class="title">RGCSM SEMESTER I <br> EXAMINATION</h1>

<label>Username</label>
<input id="username" placeholder="username">

<label>Password</label>
<input id="password" type="password" placeholder="password">

<label>Student Photo</label>
<input type="file" id="photo" accept="image/*">

<button class="wax-btn" onclick="login()">ENTER</button>
<p id="loginError"></p>
</section>

<section id="quizPage" class="hidden">
<div class="quiz-layout">

<div class="glass quiz-main">
<div class="timer" id="timer">60:00</div>

<div id="question" class="question"></div>
<div id="options"></div>

<div class="action-row">
<button class="action prev" onclick="prevQuestion()">Previous</button>
<button class="action next" onclick="nextQuestion()">Save & Next</button>
<button class="action submit" onclick="submitQuiz()">Submit Exam</button>
</div>
</div>

<div class="glass quiz-main">
<h2>Exam Map</h2>
<div id="nav" class="nav-grid"></div>
</div>

</div>
</section>

<section id="resultPage" class="hidden">
<div class="glass result">
<h1 class="title">Thanks for submitting exam</h1>
<h2>Your responses have been safely submitted into the evaluation archives.</h2>
</div>
</section>

</main>

  {q:"Which MS Word feature allows creating a list of citations and references automatically?",o:["Bookmarks","Bibliography","Mail Merge","Track Changes"],a:1},
  {q:"Which Excel function returns the smallest value in a selected range?",o:["MIN()","LOW()","SMALL()","LEAST()"],a:0},
  {q:"Which PowerPoint view displays only the text content of slides?",o:["Reading View","Outline View","Normal View","Slide Show"],a:1},
  {q:"Which HTML tag is used to create a numbered list?",o:["<ul>","<ol>","<li>","<dl>"],a:1},
  {q:"Which MS Access object is primarily used to automate repetitive database tasks?",o:["Form","Macro","Report","Query"],a:1},
  {q:"Which Windows utility is used to view running processes and system performance?",o:["Disk Management","Control Panel","Task Manager","System Restore"],a:2},

  {q:"The full form of BIOS is:",o:["Basic Input Output System","Binary Input Output Setup","Basic Internal Operating System","Binary Integrated Output System"],a:0},

  {q:"Which MS Word feature automatically corrects common spelling mistakes while typing?",o:["Track Changes","AutoCorrect","SmartArt","Research"],a:1},

  {q:"Which Excel function returns the highest value from a selected range?",o:["MAX()","HIGH()","LARGE()","TOP()"],a:0},
  {q:"Which PowerPoint feature automatically applies movement effects to objects during a slideshow?",o:["Transitions","Animations","Themes","Layouts"],a:1},

];

/* RANDOMIZE QUESTIONS */
quiz.forEach(q=>q.rand=Math.random());
quiz.sort((a,b)=>a.rand-b.rand);

/* VARIABLES */
let currentQuestion=0;
let answers=new Array(quiz.length).fill(null);
let username="";

/* DOM */
const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");
const navEl=document.getElementById("nav");
const loginError=document.getElementById("loginError");
const loginPage=document.getElementById("loginPage");
const quizPage=document.getElementById("quizPage");
const resultPage=document.getElementById("resultPage");

/* LOGIN */
function login(){
const user=document.getElementById("username").value.trim();
const pass=document.getElementById("password").value.trim();

const match=user.match(/^rgcsm(\d{3})$/);

if(!match){
loginError.innerText="Invalid Username Format";
return;
}

if(match[1]!==pass){
loginError.innerText="Invalid Password";
return;
}

username=user;

loginPage.classList.add("hidden");
quizPage.classList.remove("hidden");

buildNavigation();
loadQuestion();
startTimer();
}

/* LOAD QUESTION */
function loadQuestion(){
const q=quiz[currentQuestion];
questionEl.innerText=`${currentQuestion+1}. ${q.q}`;
optionsEl.innerHTML="";

q.o.forEach((opt,i)=>{
const div=document.createElement("div");
div.className="option";
if(answers[currentQuestion]===i) div.classList.add("selected");

div.innerText=opt;
div.onclick=()=>{
answers[currentQuestion]=i;
loadQuestion();
updateNavigation();
};

optionsEl.appendChild(div);
});

updateNavigation();
}

/* NAV */
function buildNavigation(){
navEl.innerHTML="";
quiz.forEach((_,i)=>{
const btn=document.createElement("button");
btn.innerText=i+1;
btn.onclick=()=>{currentQuestion=i;loadQuestion();};
navEl.appendChild(btn);
});
updateNavigation();
}

function updateNavigation(){
[...navEl.children].forEach((btn,i)=>{
btn.classList.remove("done","current");
if(answers[i]!==null) btn.classList.add("done");
if(i===currentQuestion) btn.classList.add("current");
});
}

/* NAV BUTTONS */
function nextQuestion(){
if(currentQuestion<quiz.length-1){
currentQuestion++;
loadQuestion();
}
}

function prevQuestion(){
if(currentQuestion>0){
currentQuestion--;
loadQuestion();
}
}

/* TIMER */
let seconds=3600;
let timerInterval;

function startTimer(){
timerInterval=setInterval(()=>{
seconds--;
let m=Math.floor(seconds/60);
let s=seconds%60;

document.getElementById("timer").innerText=
`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

if(seconds<=0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

/* SUBMIT */
function submitQuiz(){
clearInterval(timerInterval);
quizPage.classList.add("hidden");
resultPage.classList.remove("hidden");
}

/* PARTICLES */
const canvas=document.getElementById("particle-canvas");
const c=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

const particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
v:Math.random()*0.5+0.2
});
}

function animate(){
c.clearRect(0,0,canvas.width,canvas.height);
c.fillStyle="gold";

particles.forEach(p=>{
p.y-=p.v;
if(p.y<0)p.y=canvas.height;

c.beginPath();
c.arc(p.x,p.y,p.r,0,Math.PI*2);
c.fill();
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
